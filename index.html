<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peptone - Order from Disorder Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>

  <style>
    :root {
      --bg: #000000;
      --stage: #060607;
      --panel: #0b0b0d;
      --panel-2: #0f0f12;
      --line: #202024;
      --line-2: #17171a;
      --text: #f4f4f6;
      --muted: #8a8a90;
      --dim: #5a5a61;
      --accent: #7c5cff;
      --accent-soft: rgba(124, 92, 255, .16);
      --accent-line: rgba(124, 92, 255, .55);
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      display: flex; flex-direction: row;
      font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
      background: var(--bg); margin: 0; padding: 16px; gap: 16px;
      height: 100vh; overflow: hidden; color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .eyebrow { font-size: .68rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }

    /* ---------- stage / plate ---------- */
    #stage {
      flex: 1 1 auto; position: relative; display: flex; align-items: center; justify-content: center;
      background: var(--stage); border: 1px solid var(--line-2); border-radius: 14px;
      padding: 22px; min-width: 0; overflow: hidden;
    }
    #canvas-container { display: flex; align-items: center; justify-content: center; max-width: 100%; max-height: 100%; }
    canvas {
      max-width: 100%; max-height: calc(100vh - 80px);
      width: auto !important; height: auto !important; border-radius: 6px; display: block;
    }
    #canvas-container.trans canvas {
      background-image:
        linear-gradient(45deg, #26262b 25%, transparent 25%), linear-gradient(-45deg, #26262b 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #26262b 75%), linear-gradient(-45deg, transparent 75%, #26262b 75%);
      background-size: 22px 22px; background-position: 0 0, 0 11px, 11px -11px, -11px 0;
    }
    .plate-mark {
      position: absolute; left: 26px; font-size: .64rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase; color: var(--dim); pointer-events: none;
    }
    #plateEyebrow { top: 26px; }
    #plateCaption { bottom: 26px; color: var(--muted); }
    #plateState { bottom: 26px; right: 26px; left: auto; color: var(--accent); }
    #drop-hint {
      position: absolute; inset: 12px; border: 1.5px dashed var(--accent-line); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; color: var(--text);
      font-size: .95rem; letter-spacing: .04em; opacity: 0; transition: opacity .12s;
      background: rgba(124,92,255,.06); pointer-events: none;
    }
    #stage.dragover #drop-hint { opacity: 1; }

    /* ---------- control panel ---------- */
    #controls {
      width: 384px; flex-shrink: 0; background: var(--panel);
      border: 1px solid var(--line-2); border-radius: 14px;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-head { padding: 18px 18px 14px; border-bottom: 1px solid var(--line-2); }
    .head-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .icon-row { display: flex; gap: 8px; }
    .icon-btn {
      width: 38px; height: 38px; border-radius: 50%; background: #161619;
      border: 1px solid var(--line); color: var(--text); display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .15s, border-color .15s, transform .06s; padding: 0;
    }
    .icon-btn:hover { background: #202025; border-color: #34343b; }
    .icon-btn:active { transform: scale(.94); }
    .icon-btn svg { width: 17px; height: 17px; }
    h1 { margin: 0; font-size: 1.55rem; line-height: 1.05; letter-spacing: -.02em; font-weight: 700; }
    .subtitle { margin-top: 8px; font-size: .78rem; line-height: 1.5; color: var(--muted); }
    .subtitle .kbd { color: var(--text); font-weight: 600; }

    .panel-body { padding: 8px 18px 18px; overflow-y: auto; flex: 1 1 auto; display: flex; flex-direction: column; gap: 8px; }
    .panel-body::-webkit-scrollbar { width: 9px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; border: 2px solid var(--panel); }

    .section { border-top: 1px solid var(--line-2); padding-top: 12px; margin-top: 6px; }
    .section:first-child { border-top: none; margin-top: 0; }
    .section-title {
      display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none;
      font-size: .68rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--muted);
      padding: 4px 0 10px;
    }
    .section-title .chev { color: var(--dim); font-size: .6rem; transition: transform .15s; }
    .section.collapsed .chev { transform: rotate(-90deg); }
    .section-body { display: flex; flex-direction: column; gap: 12px; padding-bottom: 4px; }
    .section.collapsed .section-body { display: none; }

    /* STATE list */
    .state-list { display: flex; flex-direction: column; gap: 8px; }
    .state-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 16px; border: 1px solid var(--line); border-radius: var(--radius);
      background: var(--panel-2); color: var(--muted); cursor: pointer;
      transition: border-color .15s, color .15s, background .15s; font-size: .92rem; font-weight: 600;
    }
    .state-item:hover { border-color: #34343b; color: var(--text); }
    .state-item .desc { font-size: .68rem; font-weight: 500; color: var(--dim); letter-spacing: .02em; }
    .state-item.active { border-color: var(--accent); color: #fff; background: var(--accent-soft); box-shadow: 0 0 0 1px var(--accent-line) inset; }
    .state-item.active .desc { color: var(--muted); }

    /* dropzone + recents */
    .dropzone {
      display: flex; align-items: center; gap: 12px; padding: 15px; border: 1.5px dashed var(--line);
      border-radius: 10px; background: var(--panel-2); cursor: pointer; transition: border-color .15s, background .15s;
    }
    .dropzone:hover { border-color: var(--accent-line); background: #121216; }
    .dropzone svg { width: 24px; height: 24px; color: var(--muted); flex-shrink: 0; }
    .dz-text { font-size: .8rem; color: var(--text); line-height: 1.45; }
    .dz-text b { font-weight: 700; }
    .dz-text span { color: var(--dim); font-size: .7rem; }
    .recent-strip { display: flex; gap: 7px; flex-wrap: wrap; }
    .recent-strip:empty { display: none; }
    .thumb {
      width: 44px; height: 44px; border-radius: 7px; background-size: cover; background-position: center;
      border: 1px solid var(--line); cursor: pointer; transition: border-color .15s, transform .06s;
    }
    .thumb:hover { border-color: #34343b; }
    .thumb.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-line) inset; }
    .thumb:active { transform: scale(.95); }

    /* sliders */
    .slider-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
    .slabel { font-size: .8rem; color: var(--text); font-weight: 500; }
    .sval { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: .74rem; font-weight: 600; color: var(--accent); min-width: 40px; text-align: right; }
    input[type=range] {
      -webkit-appearance: none; appearance: none; width: 100%; height: 3px; border-radius: 3px;
      background: var(--line); cursor: pointer; outline: none; margin: 5px 0;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 15px; height: 15px; border-radius: 50%;
      background: #fff; border: 3px solid var(--accent); cursor: pointer; margin-top: 0;
    }
    input[type=range]::-moz-range-thumb { width: 13px; height: 13px; border-radius: 50%; background: #fff; border: 3px solid var(--accent); cursor: pointer; }

    .control-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .control-row .slabel { flex: 1; }
    select, input[type=text] {
      width: 100%; padding: 10px 11px; font-family: inherit; font-size: .82rem;
      background: var(--panel-2); color: var(--text); border: 1px solid var(--line); border-radius: 8px;
      cursor: pointer; outline: none; -webkit-appearance: none; appearance: none;
    }
    select:focus, input[type=text]:focus { border-color: var(--accent-line); }
    input[type=text] { cursor: text; font-family: ui-monospace, monospace; font-size: .72rem; }
    input[type=color] { width: 40px; height: 28px; padding: 0; border: 1px solid var(--line); border-radius: 7px; background: none; cursor: pointer; }

    /* custom switch. p5 renders: <div.switch><label><input></label><div.track></div></div> */
    .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; display: inline-block; }
    .switch label { position: absolute; inset: 0; margin: 0; display: block; cursor: pointer; z-index: 2; }
    .switch input { position: absolute; inset: 0; width: 100%; height: 100%; margin: 0; opacity: 0; cursor: pointer; }
    .switch .track { position: absolute; inset: 0; background: var(--line); border-radius: 22px; transition: background .15s; pointer-events: none; }
    .switch .track::before {
      content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; border-radius: 50%;
      background: #7a7a82; transition: transform .15s, background .15s;
    }
    .switch.on .track { background: var(--accent-soft); box-shadow: 0 0 0 1px var(--accent-line) inset; }
    .switch.on .track::before { transform: translateX(18px); background: var(--accent); }

    button.btn {
      width: 100%; padding: 12px; border-radius: 9px; font-weight: 600; font-size: .85rem; cursor: pointer;
      border: 1px solid var(--line); background: var(--panel-2); color: var(--text);
      transition: background .15s, border-color .15s, transform .06s;
    }
    button.btn:hover { background: #17171b; border-color: #34343b; }
    button.btn:active { transform: scale(.99); }
    button.btn.primary { background: #fff; color: #000; border-color: #fff; }
    button.btn.primary:hover { background: #e6e6ea; }
    button.btn.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.btn.accent:hover { filter: brightness(1.08); }
    button.btn.active { border-color: var(--accent); background: var(--accent-soft); color: #fff; }
    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }
    .kbd { font-family: ui-monospace, monospace; font-size: .7rem; opacity: .8; }

    #toast {
      position: fixed; bottom: 26px; left: 50%; transform: translate(-50%, 20px);
      background: #fff; color: #000; padding: 11px 20px; border-radius: 9px;
      font-size: .84rem; font-weight: 600; opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s; z-index: 60; max-width: 80vw;
    }
    #toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 820px) {
      body { flex-direction: column; overflow: auto; }
      #controls { width: 100%; }
      canvas { max-height: 52vh; }
    }
    .brand-logo { height: 22px; width: auto; display: block; }
  </style>
</head>

    // ---------- setup ----------
    function setup() {
      let canvas = createCanvas(BASE_RES, BASE_RES);
      canvas.parent('canvas-container');

      patternSelect = document.getElementById('patternType');
      ratioSelect = document.getElementById('ratioType');
      ratioSelect.value = '1:1';
      ratioSelect.addEventListener('change', () => { updateCanvasAndImage(); scheduleRender(); });
      patternSelect.addEventListener('change', scheduleRender);

      createUI();
      setupSections();
      setupImageInput();
      setupDropAndPaste();
      setupKeyboard();
      refreshPresetDropdown();

      initParallaxUI();
      loadDefaultImages();
    }

    function loadDefaultImages() {
      const srcs = DEFAULT_IMGS;
      let loaded = new Array(srcs.length).fill(null), remaining = srcs.length;
      const done = () => { if (--remaining === 0) finishDefaultImages(loaded); };
      srcs.forEach((src, i) => loadImage(src, (im) => { loaded[i] = im; done(); }, done));
    }
    function finishDefaultImages(loaded) {
      let imgs = loaded.filter(Boolean);
      if (!imgs.length) imgs = [makeDefaultImage()];
      for (let i = imgs.length - 1; i >= 0; i--) addRecent(imgs[i], true); // imgs[0] ends up first + active
      originalImg = imgs[0];
      applyState(STATES['Emergence']);
      setActiveState('Emergence');
      buildRecentStrip();
    }

    function makeDefaultImage() {
      // Multi-octave Perlin terrain: light ridges & dark valleys -> the ridgeline look.
      let w = 1000, h = 1000;
      let g = createGraphics(w, h); g.pixelDensity(1);
      g.loadPixels();
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          let n = noise(x * 0.0045, y * 0.0045) * 0.68
                + noise(x * 0.018, y * 0.018) * 0.24
                + noise(x * 0.06, y * 0.06) * 0.08;
          n = constrain((n - 0.5) * 1.7 + 0.5, 0, 1);
          let v = n * 255;
          let idx = 4 * (y * w + x);
          g.pixels[idx] = v; g.pixels[idx + 1] = v; g.pixels[idx + 2] = v; g.pixels[idx + 3] = 255;
        }
      }
      g.updatePixels();
      let out = g.get(); g.remove(); return out;
    }

    function setupImageInput() {
      document.getElementById('imageUpload').addEventListener('change', function (e) {
        let file = e.target.files[0]; if (file) loadFile(file); e.target.value = '';
      });
    }

    function loadFile(file) {
      if (!file.type || file.type.indexOf('image') !== 0) return toast('That is not an image file.');
      let reader = new FileReader();
      reader.onload = function (event) {
        loadImage(event.target.result, (loadedImg) => {
          originalImg = loadedImg;
          document.getElementById('plateEyebrow').textContent = 'Source';
          addRecent(loadedImg, false);
          updateCanvasAndImage();
          scheduleRender();
          toast('Image loaded · ' + loadedImg.width + '×' + loadedImg.height);
        }, () => toast('Could not decode that image.'));
      };
      reader.readAsDataURL(file);
    }

    function setupDropAndPaste() {
      const stage = document.getElementById('stage');
      ['dragenter', 'dragover'].forEach(ev => stage.addEventListener(ev, e => { e.preventDefault(); stage.classList.add('dragover'); }));
      ['dragleave', 'drop'].forEach(ev => stage.addEventListener(ev, e => {
        e.preventDefault();
        if (ev === 'dragleave' && stage.contains(e.relatedTarget)) return;
        stage.classList.remove('dragover');
      }));
      stage.addEventListener('drop', e => { const f = e.dataTransfer.files && e.dataTransfer.files[0]; if (f) loadFile(f); });
      window.addEventListener('paste', e => {
        const items = e.clipboardData && e.clipboardData.items; if (!items) return;
        for (const it of items) { if (it.type.indexOf('image') === 0) { loadFile(it.getAsFile()); break; } }
      });
    }

    function setupKeyboard() {
      window.addEventListener('keydown', e => {
        if (e.target.matches('input, select, textarea')) return;
        const k = e.key.toLowerCase();
        if (k === 'r') randomize();
        else if (k === 's') { if (img) saveCanvas('conformation-field', 'png'); }
        else if (k === '0') resetDefaults();
        else if (k === ' ') { e.preventDefault(); togglePlay(); }
      });
    }

    // ---------- recent images ----------
    function addRecent(pImg, isDefault) {
      let tw = 48, th = 48;
      let tg = createGraphics(tw, th); tg.pixelDensity(1); tg.background(12);
      let ir = pImg.width / pImg.height, cr = tw / th, dw, dh;
      if (ir > cr) { dh = th; dw = th * ir; } else { dw = tw; dh = tw / ir; }
      tg.image(pImg, (tw - dw) / 2, (th - dh) / 2, dw, dh);
      let url = tg.elt.toDataURL(); tg.remove();
      recentImages.unshift({ img: pImg, thumb: url, isDefault: !!isDefault });
      if (recentImages.length > 10) recentImages.pop();
      buildRecentStrip();
    }
    function buildRecentStrip() {
      let strip = document.getElementById('recentStrip'); strip.innerHTML = '';
      recentImages.forEach(it => {
        let d = document.createElement('div');
        d.className = 'thumb' + (it.img === originalImg ? ' active' : '');
        d.style.backgroundImage = `url(${it.thumb})`;
        d.title = it.isDefault ? 'Default field' : 'Use this image';
        d.addEventListener('click', () => {
          originalImg = it.img;
          document.getElementById('plateEyebrow').textContent = it.isDefault ? 'Illustrative' : 'Source';
          updateCanvasAndImage(); scheduleRender(); buildRecentStrip();
        });
        strip.appendChild(d);
      });
    }

    // ---------- canvas / image (with pre-process baked in) ----------
    function updateCanvasAndImage() {
      if (!originalImg) return;
      let ratioStr = ratioSelect.value;
      let newW = BASE_RES, newH = BASE_RES;
      if (ratioStr === 'match') newH = BASE_RES * (originalImg.height / originalImg.width);
      else if (ratioStr === '16:9') newH = BASE_RES * (9 / 16);
      else if (ratioStr === '9:16') newW = BASE_RES * (9 / 16);
      else if (ratioStr === '4:3') newH = BASE_RES * (3 / 4);
      resizeCanvas(newW, newH);

      let imgRatio = originalImg.width / originalImg.height;
      let canvasRatio = width / height;
      let sx = 0, sy = 0, sw = originalImg.width, sh = originalImg.height;
      if (imgRatio > canvasRatio) { sw = originalImg.height * canvasRatio; sx = (originalImg.width - sw) / 2; }
      else { sh = originalImg.width / canvasRatio; sy = (originalImg.height - sh) / 2; }

      // pre-process: blur + brightness baked via canvas filter, then a gamma LUT
      let blur = preBlurSlider ? preBlurSlider.value() : 0;
      let bright = preBrightSlider ? preBrightSlider.value() : 1;
      let pg = createGraphics(width, height); pg.pixelDensity(1);
      if (blur > 0 || bright !== 1) pg.drawingContext.filter = `blur(${blur}px) brightness(${bright})`;
      pg.image(originalImg, 0, 0, width, height, sx, sy, sw, sh);
      pg.drawingContext.filter = 'none';
      img = pg.get(); pg.remove();
      img.loadPixels();

      let gamma = preGammaSlider ? preGammaSlider.value() : 1;
      if (gamma !== 1) {
        let lut = new Uint8Array(256);
        for (let i = 0; i < 256; i++) lut[i] = constrain(Math.round(255 * Math.pow(i / 255, gamma)), 0, 255);
        let p = img.pixels;
        for (let i = 0; i < p.length; i += 4) { p[i] = lut[p[i]]; p[i + 1] = lut[p[i + 1]]; p[i + 2] = lut[p[i + 2]]; }
        img.updatePixels(); img.loadPixels();
      }

      computeFlowField();
      invalidateGrain();
    }

    function hexToRgb(hex) { return { r: parseInt(hex.slice(1, 3), 16), g: parseInt(hex.slice(3, 5), 16), b: parseInt(hex.slice(5, 7), 16) }; }

    // ---------- flow field (Sobel gradient -> contour direction) ----------
    function computeFlowField() {
      if (!img) { flowField = null; return; }
      let step = 6;
      let fw = Math.ceil(width / step), fh = Math.ceil(height / step);
      let ang = new Float32Array(fw * fh), mag = new Float32Array(fw * fh);
      let px = img.pixels, iw = img.width, ih = img.height;
      const lum = (xx, yy) => { xx = constrain(xx | 0, 0, iw - 1); yy = constrain(yy | 0, 0, ih - 1); let i = (yy * iw + xx) * 4; return px[i] * .299 + px[i + 1] * .587 + px[i + 2] * .114; };
      let maxM = 1e-6;
      for (let gy = 0; gy < fh; gy++) {
        for (let gx = 0; gx < fw; gx++) {
          let X = gx * step, Y = gy * step;
          let gxv = -lum(X - step, Y - step) - 2 * lum(X - step, Y) - lum(X - step, Y + step) + lum(X + step, Y - step) + 2 * lum(X + step, Y) + lum(X + step, Y + step);
          let gyv = -lum(X - step, Y - step) - 2 * lum(X, Y - step) - lum(X + step, Y - step) + lum(X - step, Y + step) + 2 * lum(X, Y + step) + lum(X + step, Y + step);
          let m = Math.sqrt(gxv * gxv + gyv * gyv);
          ang[gy * fw + gx] = Math.atan2(gyv, gxv) + HALF_PI;   // perpendicular to gradient = along contour
          mag[gy * fw + gx] = m;
          if (m > maxM) maxM = m;
        }
      }
      let norm = maxM * 0.5;
      for (let i = 0; i < mag.length; i++) mag[i] = Math.min(1, mag[i] / norm);
      flowField = { step, fw, fh, ang, mag };
    }
    function flowAt(x, y) {
      let f = flowField;
      let gx = constrain((x / f.step) | 0, 0, f.fw - 1), gy = constrain((y / f.step) | 0, 0, f.fh - 1);
      let i = gy * f.fw + gx;
      return { a: f.ang[i], m: f.mag[i] };
    }

    // ---------- render loop ----------
    function isAnimating() {
      if (isRecording) return true;
      if (isPaused) return false;
      let mode = patternSelect.value, sp = speedSlider.value();
      let animatedMode = (mode === 'waves' || mode === 'random') && sp > 0;
      let wobbleAnim = analogToggle.checked() && wobbleSlider.value() > 0 && sp > 0;
      let grainAnim = grainSlider.value() > 0 && sp > 0;
      return animatedMode || wobbleAnim || grainAnim;
    }
    function scheduleRender() { if (isAnimating()) loop(); else { noLoop(); redraw(); } }
    function mouseMoved() { if (img && !isPaused && mousePushSlider.value() > 0 && !isLooping()) redraw(); }

    function togglePlay() { isPaused = !isPaused; playButton.html(isPaused ? 'Play' : 'Pause'); scheduleRender(); }

    function draw() {
      if (transparentBg) clear(); else background(bgBrightnessSlider.value());
      if (img) {
        strokeCap(ROUND);
        let base = radians(angleSlider.value());
        drawField(base);
        if (crosshatchToggle.checked()) drawField(base + HALF_PI);
        applyPost();
      } else {
        push(); fill(90); noStroke(); textAlign(CENTER, CENTER); textSize(20);
        text("Drop, paste, or upload an image.", width / 2, height / 2); pop();
      }
    }

    function drawField(angle) {
      const emit = (x1, y1, x2, y2, w, r, g, b) => { stroke(r, g, b); strokeWeight(w); line(x1, y1, x2, y2); };
      generateField(angle, emit);
    }

    // One geometry generator, feeds both the canvas renderer and the SVG exporter.
    // opts.layer (0=far,1=middle,2=near) + opts.split ('depth'|'interleave') gate which
    // segments are emitted, for the parallax depth-layer export.
    function generateField(angle, emit, opts) {
      let lineSpacing = densitySlider.value();
      let maxWeight = maxThicknessSlider.value();
      let minWeight = minThicknessSlider.value();
      let useSmoothing = smoothToggle.checked();
      let smoothFactor = useSmoothing ? (1.0 - thicknessSmoothSlider.value()) : 1.0;
      let res = resolutionSlider.value();
      let mode = patternSelect.value;
      let speed = speedSlider.value();
      let amp = waveAmpSlider.value();
      let freq = waveFreqSlider.value();
      let enableAnalog = analogToggle.checked();
      let warpAmount = warpSlider.value();
      let wobbleAmount = wobbleSlider.value();
      let mouseForce = mousePushSlider.value();
      let invert = invertToggle.checked();
      let respectAlpha = alphaToggle.checked();
      let sampleColor = sampleColorToggle.checked();
      let useDuotone = duotoneToggle.checked();
      let col1 = hexToRgb(colorPicker1.value());
      let col2 = hexToRgb(colorPicker2.value());
      let contrastVal = contrastSlider.value();
      let useFlow = flowToggle.checked() && flowField;
      let flowStrength = flowStrengthSlider.value();

      let loopDuration = 150;
      let phase = isRecording ? (frameCount % loopDuration) / loopDuration * TWO_PI : frameCount * speed;

      let cx = width / 2, cy = height / 2;
      let cosA = cos(angle), sinA = sin(angle);
      let maxRegion = sqrt(width * width + height * height) + 100;
      let layerFilter = (opts && opts.layer != null) ? opts.layer : null;
      let splitMode = (opts && opts.split) ? opts.split : 'depth';
      let rowIndex = -1;

      for (let y = -maxRegion / 2; y < maxRegion / 2; y += lineSpacing) {
        rowIndex++;
        let currentW = -1, currentDisplace = 0, flowY = 0;

        for (let x = -maxRegion / 2; x < maxRegion / 2; x += res) {
          let y1 = y, y2 = y;
          if (mode === 'waves') {
            y1 = y + sin(x * freq + phase) * amp;
            y2 = y + sin((x + res) * freq + phase) * amp;
          } else if (mode === 'random') {
            let ns = 0.5;
            let n1 = noise(x * freq * ns, y * freq * ns, phase);
            let n2 = noise((x + res) * freq * ns, y * freq * ns, phase);
            y1 = y + map(n1, 0, 1, -amp * 1.5, amp * 1.5);
            y2 = y + map(n2, 0, 1, -amp * 1.5, amp * 1.5);
          }
          if (enableAnalog && wobbleAmount > 0) {
            let an = (noise(x * 0.02, y * 0.02, phase * 0.5) - 0.5) * wobbleAmount;
            y1 += an; y2 += an;
          }

          let worldX = cx + x * cosA - y1 * sinA;
          let worldY = cy + x * sinA + y1 * cosA;

          if (worldX >= 0 && worldX < width && worldY >= 0 && worldY < height) {
            let ix = floor(worldX), iy = floor(worldY);
            let index = (iy * img.width + ix) * 4;
            let r = img.pixels[index], g = img.pixels[index + 1], b_col = img.pixels[index + 2], a_col = img.pixels[index + 3];
            if (respectAlpha && a_col < 100) { currentW = -1; continue; }

            let b = (r * 0.299 + g * 0.587 + b_col * 0.114);
            let nb = (b / 255.0 - 0.5) * contrastVal + 0.5;
            b = constrain(nb, 0, 1) * 255;

            // flow: bend the line toward the local contour direction, weighted by edge strength
            if (useFlow && flowStrength > 0) {
              let f = flowAt(worldX, worldY);
              let d = Math.atan2(Math.sin(f.a - angle), Math.cos(f.a - angle)); // -PI..PI
              if (d > HALF_PI) d -= PI; else if (d < -HALF_PI) d += PI;          // undirected fold to -90..90
              let slope = flowStrength * f.m * Math.tan(constrain(d, -1.15, 1.15));
              flowY += slope * res;
              flowY *= 0.985; // leaky: wrap edges, then relax
            }

            let cr, cg, cb;
            if (sampleColor) { cr = r; cg = g; cb = b_col; }
            else if (useDuotone) {
              let l = b / 255.0; if (invert) l = 1.0 - l;
              cr = lerp(col1.r, col2.r, l); cg = lerp(col1.g, col2.g, l); cb = lerp(col1.b, col2.b, l);
            } else { cr = col1.r; cg = col1.g; cb = col1.b; }

            let targetDisplace = 0;
            if (enableAnalog && warpAmount > 0) targetDisplace = invert ? map(b, 0, 255, 0, warpAmount) : map(b, 0, 255, warpAmount, 0);
            currentDisplace = lerp(currentDisplace, targetDisplace, smoothFactor);

            let fy1 = y1 + currentDisplace + flowY;
            let fy2 = y2 + currentDisplace + flowY;

            if (mouseForce > 0) {
              let dm = dist(worldX, worldY, mouseX, mouseY);
              if (dm < 150) { let p = map(dm, 0, 150, mouseForce, 0); fy1 += p; fy2 += p; }
            }

            let targetW = invert ? map(b, 0, 255, minWeight, maxWeight) : map(b, 0, 255, maxWeight, minWeight);
            if (currentW === -1 || !useSmoothing) currentW = targetW; else currentW = lerp(currentW, targetW, smoothFactor);

            let wx1 = cx + x * cosA - fy1 * sinA;
            let wy1 = cy + x * sinA + fy1 * cosA;
            let wx2 = cx + (x + res) * cosA - fy2 * sinA;
            let wy2 = cy + (x + res) * sinA + fy2 * cosA;
            if (layerFilter === null) {
              emit(wx1, wy1, wx2, wy2, currentW, cr, cg, cb);
            } else {
              let lay = splitMode === 'interleave' ? (rowIndex % 3) : (b < 85 ? 0 : (b < 170 ? 1 : 2));
              if (lay === layerFilter) emit(wx1, wy1, wx2, wy2, currentW, cr, cg, cb);
            }
          } else {
            currentW = -1;
          }
        }
      }
    }

    // ---------- post: bloom + grain ----------
    function applyPost() {
      let bloom = bloomSlider.value(), radius = bloomRadiusSlider.value(), grain = grainSlider.value();
      if (bloom > 0 && radius > 0) {
        let snap = get();
        blendMode(ADD);
        push();
        tint(255, map(bloom, 0, 100, 0, 255));
        drawingContext.filter = `blur(${radius}px)`;
        image(snap, 0, 0, width, height);
        drawingContext.filter = 'none';
        pop();
        blendMode(BLEND); noTint();
      }
      if (grain > 0) drawGrain(grain);
    }
    function ensureGrain() {
      if (grainBuffer && grainSize.w === width && grainSize.h === height) return;
      if (grainBuffer) grainBuffer.remove();
      grainBuffer = createGraphics(width, height); grainBuffer.pixelDensity(1);
      grainBuffer.loadPixels();
      let p = grainBuffer.pixels;
      for (let i = 0; i < p.length; i += 4) { let v = Math.random() * 255; p[i] = v; p[i + 1] = v; p[i + 2] = v; p[i + 3] = 255; }
      grainBuffer.updatePixels();
      grainSize = { w: width, h: height };
    }
    function invalidateGrain() { grainSize = { w: 0, h: 0 }; }
    function drawGrain(amount) {
      ensureGrain();
      blendMode(OVERLAY);
      push();
      tint(255, map(amount, 0, 100, 0, 120));
      let ox = isAnimating() ? (frameCount * 13) % 97 : 0;
      let oy = isAnimating() ? (frameCount * 7) % 89 : 0;
      image(grainBuffer, -ox, -oy, width + ox, height + oy);
      pop();
      blendMode(BLEND); noTint();
    }

    // ---------- SVG export ----------
    function exportSVG() {
      if (!img) return toast('Load an image first.');
      let parts = [];
      const emit = (x1, y1, x2, y2, w, r, g, b) => {
        parts.push(`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgb(${r | 0},${g | 0},${b | 0})" stroke-width="${w.toFixed(2)}"/>`);
      };
      let base = radians(angleSlider.value());
      generateField(base, emit);
      if (crosshatchToggle.checked()) generateField(base + HALF_PI, emit);
      let bg = bgBrightnessSlider.value() | 0;
      let bgPart = transparentBg ? '' : `<rect width="100%" height="100%" fill="rgb(${bg},${bg},${bg})"/>`;
      let svg =
        `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">` +
        bgPart + `<g fill="none" stroke-linecap="round">${parts.join('')}</g></svg>`;
      downloadBlob(new Blob([svg], { type: 'image/svg+xml' }), 'conformation-field.svg');
      toast(`SVG exported · ${parts.length.toLocaleString()} lines`);
    }

    function downloadBlob(blob, name) {
      let a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = name; a.click();
    }

    // Compute every line as an array of vertices (world position + colour/width) at one phase.
    // Used by the animated SVG saver: run it across K phases and animate each polyline's points.
    function computeRows(angle, phase, resOverride) {
      let lineSpacing = densitySlider.value(), maxWeight = maxThicknessSlider.value(), minWeight = minThicknessSlider.value();
      let useSmoothing = smoothToggle.checked(), smoothFactor = useSmoothing ? (1 - thicknessSmoothSlider.value()) : 1;
      let res = (resOverride != null ? resOverride : resolutionSlider.value()), mode = patternSelect.value, amp = waveAmpSlider.value(), freq = waveFreqSlider.value();
      let enableAnalog = analogToggle.checked(), warpAmount = warpSlider.value(), wobbleAmount = wobbleSlider.value();
      let invert = invertToggle.checked(), respectAlpha = alphaToggle.checked(), sampleColor = sampleColorToggle.checked(), useDuotone = duotoneToggle.checked();
      let col1 = hexToRgb(colorPicker1.value()), col2 = hexToRgb(colorPicker2.value()), contrastVal = contrastSlider.value();
      let useFlow = flowToggle.checked() && flowField, flowStrength = flowStrengthSlider.value();
      let cx = width / 2, cy = height / 2, cosA = cos(angle), sinA = sin(angle);
      let maxRegion = sqrt(width * width + height * height) + 100;
      let rows = [];
      for (let y = -maxRegion / 2; y < maxRegion / 2; y += lineSpacing) {
        let verts = [], currentW = -1, currentDisplace = 0, flowY = 0;
        for (let x = -maxRegion / 2; x < maxRegion / 2; x += res) {
          let y1 = y;
          if (mode === 'waves') y1 = y + sin(x * freq + phase) * amp;
          else if (mode === 'random') { let ns = 0.5; y1 = y + map(noise(x * freq * ns, y * freq * ns, phase), 0, 1, -amp * 1.5, amp * 1.5); }
          if (enableAnalog && wobbleAmount > 0) y1 += (noise(x * 0.02, y * 0.02, phase * 0.5) - 0.5) * wobbleAmount;
          let worldX = cx + x * cosA - y1 * sinA, worldY = cy + x * sinA + y1 * cosA;
          let inC = worldX >= 0 && worldX < width && worldY >= 0 && worldY < height;
          let cr = 0, cg = 0, cb = 0, w = 0, fy1 = y1;
          if (inC) {
            let ix = floor(worldX), iy = floor(worldY), index = (iy * img.width + ix) * 4;
            let r = img.pixels[index], g = img.pixels[index + 1], b_col = img.pixels[index + 2], a_col = img.pixels[index + 3];
            if (respectAlpha && a_col < 100) { inC = false; currentW = -1; }
            else {
              let b = (r * 0.299 + g * 0.587 + b_col * 0.114); let nb = (b / 255 - 0.5) * contrastVal + 0.5; b = constrain(nb, 0, 1) * 255;
              if (useFlow && flowStrength > 0) { let f = flowAt(worldX, worldY); let d = Math.atan2(Math.sin(f.a - angle), Math.cos(f.a - angle)); if (d > HALF_PI) d -= PI; else if (d < -HALF_PI) d += PI; flowY += flowStrength * f.m * Math.tan(constrain(d, -1.15, 1.15)) * res; flowY *= 0.985; }
              if (sampleColor) { cr = r; cg = g; cb = b_col; }
              else if (useDuotone) { let l = b / 255; if (invert) l = 1 - l; cr = lerp(col1.r, col2.r, l); cg = lerp(col1.g, col2.g, l); cb = lerp(col1.b, col2.b, l); }
              else { cr = col1.r; cg = col1.g; cb = col1.b; }
              let td = 0; if (enableAnalog && warpAmount > 0) td = invert ? map(b, 0, 255, 0, warpAmount) : map(b, 0, 255, warpAmount, 0);

              fy1 = y1 + currentDisplace + flowY;
              let tw = invert ? map(b, 0, 255, minWeight, maxWeight) : map(b, 0, 255, maxWeight, minWeight);
              if (currentW === -1 || !useSmoothing) currentW = tw; else currentW = lerp(currentW, tw, smoothFactor);

            }

        }

      }
      return rows;
    }

    // Animated SVG at FULL native resolution. Neighbouring segments that share the same
    // quantised colour+thickness are merged into one <polyline> (run-length), so the file
    // keeps the exact on-screen geometry and modulation but with ~1/5 the elements and one
    // SMIL <animate> per run — smooth playback. Resolution only coarsens if runs blow past CAP.
    function exportAnimatedSVG() {
      if (!img) return toast('Load an image first.');
      const K = 8, CAP_RUNS = 24000, qW = 0.5, cbits = 3;
      let base = radians(angleSlider.value());
      let passes = crosshatchToggle.checked() ? [base, base + HALF_PI] : [base];
      let dur = speedSlider.value() > 0 ? constrain(TWO_PI / speedSlider.value() / 60, 2.5, 8) : 4;
      let baseRes = resolutionSlider.value();
      const bucket = v => `${Math.round(v.w / qW)}_${v.cr >> cbits}_${v.cg >> cbits}_${v.cb >> cbits}`;

      const countRuns = (ang, res) => {

          for (let i = 0; i < v.length - 1; i++) { if (v[i].inC) { let k = bucket(v[i]); if (k === key) len++; else { if (len) runs++; key = k; len = 1; } } else { if (len) runs++; key = null; len = 0; } }
          if (len) runs++; }

      };

      let expRes = total0 > CAP_RUNS ? Math.ceil(baseRes * total0 / CAP_RUNS) : baseRes;

      let parts = [], runCount = 0;
      for (const ang of passes) {
        let frames = [];
        for (let k = 0; k < K; k++) frames.push(computeRows(ang, k / K * TWO_PI, expRes));
        let rows0 = frames[0];
        for (let r = 0; r < rows0.length; r++) {
          let v0 = rows0[r];
          let segStart = -1, key = null, sr = 0, sg = 0, sb = 0, sw = 0, cnt = 0;
          const flush = (segEnd) => {
            if (segStart >= 0 && segEnd >= segStart) {
              let vals = [];
              for (let k = 0; k < K; k++) { let f = frames[k][r], s = '';
                for (let ix = segStart; ix <= segEnd + 1; ix++) s += (ix > segStart ? ' ' : '') + Math.round(f[ix].wx) + ',' + Math.round(f[ix].wy);
                vals.push(s); }
              vals.push(vals[0]); // seamless loop
              let n = cnt || 1;
              parts.push(`<polyline fill="none" stroke="rgb(${(sr / n) | 0},${(sg / n) | 0},${(sb / n) | 0})" stroke-width="${(sw / n).toFixed(2)}" points="${vals[0]}"><animate attributeName="points" dur="${dur}s" repeatCount="indefinite" values="${vals.join(';')}"/></polyline>`);
              runCount++;
            }
            segStart = -1; key = null; sr = sg = sb = sw = 0; cnt = 0;
          };
          for (let i = 0; i < v0.length - 1; i++) {
            if (!v0[i].inC) { flush(i - 1); continue; }
            let k = bucket(v0[i]);
            if (segStart < 0) { segStart = i; key = k; }
            else if (k !== key) { flush(i - 1); segStart = i; key = k; }
            sr += v0[i].cr; sg += v0[i].cg; sb += v0[i].cb; sw += v0[i].w; cnt++;
          }
          flush(v0.length - 2);
        }
      }
      let bg = bgBrightnessSlider.value() | 0;
      let bgPart = transparentBg ? '' : `<rect width="100%" height="100%" fill="rgb(${bg},${bg},${bg})"/>`;
      let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">${bgPart}<g stroke-linecap="round">${parts.join('')}</g></svg>`;
      downloadBlob(new Blob([svg], { type: 'image/svg+xml' }), 'conformation-field-animated.svg');
      let note = expRes > baseRes ? ` · ${expRes}px (capped)` : ' · full detail';
      toast(`Animated SVG · ${runCount.toLocaleString()} paths${note}`);
    }

    // ---------- background quick-select ----------
    function setBg(mode) {
      if (mode === 'transparent') transparentBg = true;
      else { transparentBg = false; bgBrightnessSlider.value(mode === 'white' ? 255 : 0); refreshAllLabels(); }
      document.getElementById('canvas-container').classList.toggle('trans', transparentBg);
      updateBgButtons();
      if (pxMode) pxApplyBg();
      scheduleRender();
    }
    function updateBgButtons() {
      if (!bgBtnBlack) return;

      let mode = transparentBg ? 'transparent' : (bv == 0 ? 'black' : (bv == 255 ? 'white' : 'custom'));
      bgBtnBlack.elt.classList.toggle('active', mode === 'black');
      bgBtnWhite.elt.classList.toggle('active', mode === 'white');
      bgBtnTrans.elt.classList.toggle('active', mode === 'transparent');
    }

    // ---------- state / settings ----------
    function collectState() {
      return {
        pat: patternSelect.value, rat: ratioSelect.value,
        ang: angleSlider.value(), spd: speedSlider.value(), warp: warpSlider.value(),
        wob: wobbleSlider.value(), mPsh: mousePushSlider.value(), wAmp: waveAmpSlider.value(),
        wFrq: waveFreqSlider.value(), den: densitySlider.value(), maxT: maxThicknessSlider.value(),
        minT: minThicknessSlider.value(), smStr: thicknessSmoothSlider.value(), res: resolutionSlider.value(),
        con: contrastSlider.value(), bg: bgBrightnessSlider.value(),
        c1: colorPicker1.value(), c2: colorPicker2.value(),
        anlgT: analogToggle.checked(), htchT: crosshatchToggle.checked(), smthT: smoothToggle.checked(),
        alphT: alphaToggle.checked(), duoT: duotoneToggle.checked(), sampT: sampleColorToggle.checked(), invT: invertToggle.checked(),
        trans: transparentBg,

    }
    function applyState(s) {
      const setV = (sl, v) => { if (v !== undefined && v !== null) sl.value(v); };

      if (s.rat !== undefined) ratioSelect.value = s.rat;
      setV(angleSlider, s.ang); setV(speedSlider, s.spd); setV(warpSlider, s.warp);
      setV(wobbleSlider, s.wob); setV(mousePushSlider, s.mPsh); setV(waveAmpSlider, s.wAmp);
      setV(waveFreqSlider, s.wFrq); setV(densitySlider, s.den); setV(maxThicknessSlider, s.maxT);
      setV(minThicknessSlider, s.minT); setV(thicknessSmoothSlider, s.smStr); setV(resolutionSlider, s.res);
      setV(contrastSlider, s.con); setV(bgBrightnessSlider, s.bg);
      setV(colorPicker1, s.c1); setV(colorPicker2, s.c2);
      setC(analogToggle, s.anlgT); setC(crosshatchToggle, s.htchT); setC(smoothToggle, s.smthT);
      setC(alphaToggle, s.alphT); setC(duotoneToggle, s.duoT); setC(sampleColorToggle, s.sampT); setC(invertToggle, s.invT);
      setC(flowToggle, s.flow); setV(flowStrengthSlider, s.flowS);
      setV(bloomSlider, s.bloom); setV(bloomRadiusSlider, s.bloomR); setV(grainSlider, s.grain);
      setV(preBrightSlider, s.preB); setV(preGammaSlider, s.gamma); setV(preBlurSlider, s.blur);
      if (s.trans !== undefined) transparentBg = !!s.trans;

      scheduleRender();
    }

    function exportSettings() {
      let b64 = btoa(JSON.stringify(collectState()));
      if (settingsInput) settingsInput.value(b64);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(b64).then(() => toast('Settings code copied')).catch(() => toast('Code generated below'));
      } else toast('Code generated below');
    }
    function importSettings() {
      try {
        let b64 = settingsInput.value(); if (!b64) return toast('Paste a code first.');
        applyState(JSON.parse(atob(b64))); clearActiveState(); toast('Settings loaded');
      } catch (e) { toast('Invalid settings code.'); }
    }

    // ---------- STATE control ----------
    function buildStateList() {
      const list = document.getElementById('stateList'); if (!list) return; list.innerHTML = '';
      Object.keys(STATES).forEach(name => {
        const item = document.createElement('div');
        item.className = 'state-item'; item.dataset.state = name;
        item.innerHTML = `<span>${name}</span><span class="desc">${STATES[name].desc}</span>`;
        item.addEventListener('click', () => { applyState(STATES[name]); setActiveState(name); toast(name); });
        list.appendChild(item);
      });
    }
    function setActiveState(name) {
      activeState = name;
      document.querySelectorAll('.state-item').forEach(el => el.classList.toggle('active', el.dataset.state === name));
      const p = document.getElementById('plateState'); if (p) p.textContent = name;
    }
    function clearActiveState() {

      document.querySelectorAll('.state-item').forEach(el => el.classList.remove('active'));

    function randomize() {
      allSliders.forEach(s => {
        if (s._noRand) return;
        let mn = parseFloat(s.elt.min), mx = parseFloat(s.elt.max), st = parseFloat(s.elt.step) || 1;

    // ---------- recording ----------
    function startRecording() {
      if (!img) return toast('Load an image first.');
      if (isRecording) return;
      isRecording = true; isPaused = false; chunks = []; loop();
      let stream = document.querySelector('canvas').captureStream(30);
      let options = { mimeType: 'video/webm;codecs=vp9' };
      if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm' };
      recorder = new MediaRecorder(stream, options);
      recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = () => {
        let blob = new Blob(chunks, { type: 'video/webm' });
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = 'conformation-field-loop.webm'; a.click();
        isRecording = false; recordButton.html('Export 5s Loop'); recordButton.removeClass('accent'); scheduleRender();
      };
      recorder.start(); recordButton.addClass('accent');
      let duration = 5000, elapsed = 0; frameCount = 0;
      let timer = setInterval(() => {
        elapsed += 100;
        recordButton.html(`Recording… ${Math.min(100, Math.round((elapsed / duration) * 100))}%`);
        if (elapsed >= duration) { recorder.stop(); clearInterval(timer); }
      }, 100);
    }

    const PX_DEPTHS = [

    function setParallax(on) {

    function pxRenderLayer(layerIndex) {
      let g = createGraphics(width, height); g.pixelDensity(1); g.clear(); g.strokeCap(ROUND);
      const emit = (x1, y1, x2, y2, w, r, gg, b) => { g.stroke(r, gg, b); g.strokeWeight(w); g.line(x1, y1, x2, y2); };
      let base = radians(angleSlider.value());
      generateField(base, emit, { layer: layerIndex, split: pxSplit });
      if (crosshatchToggle.checked()) generateField(base + HALF_PI, emit, { layer: layerIndex, split: pxSplit });
      return g;
    }

    function pxApplyBg() {
      const ov = document.getElementById('parallaxStage');
      if (!ov) return;
      if (transparentBg) { ov.classList.add('trans'); ov.style.background = 'transparent'; }
      else { ov.classList.remove('trans'); let v = bgBrightnessSlider.value() | 0; ov.style.background = 'rgb(' + v + ',' + v + ',' + v + ')'; }
    }
    function buildParallaxLayers() {
      const ov = document.getElementById('parallaxStage');
      pxApplyBg();
      ov.innerHTML = ''; pxLayerImgs = [];
      for (let i = 0; i < 3; i++) {
        let g = pxRenderLayer(i);
        let url = g.drawingContext.canvas.toDataURL('image/png');
        g.remove();
        let im = document.createElement('img'); im.className = 'pxlayer'; im.src = url;
        ov.appendChild(im); pxLayerImgs.push(im);
      }
    }

    function pxTick() {
      pxRAF = requestAnimationFrame(pxTick);
      pxPointer.x += (pxPointer.tx - pxPointer.x) * 0.06;
      pxPointer.y += (pxPointer.ty - pxPointer.y) * 0.06;
      pxIdle += 0.016;
      for (let i = 0; i < pxLayerImgs.length; i++) {
        const d = PX_DEPTHS[i];
        const ix = Math.cos(pxIdle * d.s) * d.a;
        const iy = Math.sin(pxIdle * d.s * 0.8) * d.a;
        const px = pxPointer.x * d.p + ix;
        const py = pxPointer.y * d.p + iy;
        pxLayerImgs[i].style.transform = 'translate3d(' + px.toFixed(2) + 'px,' + py.toFixed(2) + 'px,0)';
      }
    }

    // ---- self-contained parallax document (shared by HTML export + zip snippet) ----

      '</head><body><div class="lc" id="lc">' +
      '<img data-depth="far" src="' + srcs.far + '" alt="">' +
      '<img data-depth="middle" src="' + srcs.middle + '" alt="">' +
      '<img data-depth="near" src="' + srcs.near + '" alt="">' +
      '</div><script>(function(){var el=document.getElementById("lc"),ls=[].slice.call(el.querySelectorAll("img"));' +
      'var cfg={far:{p:6,a:3,s:.6},middle:{p:12,a:6,s:.85},near:{p:22,a:11,s:1.1}};var tx=0,ty=0,cx=0,cy=0,t=0;' +
      'el.addEventListener("mousemove",function(e){var r=el.getBoundingClientRect();tx=((e.clientX-r.left)/r.width-.5)*2;ty=((e.clientY-r.top)/r.height-.5)*2;});' +
      'el.addEventListener("mouseleave",function(){tx=0;ty=0;});' +
      'function tick(){requestAnimationFrame(tick);cx+=(tx-cx)*.06;cy+=(ty-cy)*.06;t+=.016;ls.forEach(function(im){var c=cfg[im.dataset.depth];var ix=Math.cos(t*c.s)*c.a,iy=Math.sin(t*c.s*.8)*c.a;im.style.transform="translate3d("+(cx*c.p+ix).toFixed(2)+"px,"+(cy*c.p+iy).toFixed(2)+"px,0)";});}tick();})();' +
      '<\/script></body></html>';

    // ---- minimal store-mode ZIP writer ----
    const CRC_TABLE = (() => { let t = []; for (let n = 0; n < 256; n++) { let c = n; for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1); t[n] = c >>> 0; } return t; })();
    function crc32(buf) { let c = 0xFFFFFFFF; for (let i = 0; i < buf.length; i++) c = CRC_TABLE[(c ^ buf[i]) & 0xFF] ^ (c >>> 8); return (c ^ 0xFFFFFFFF) >>> 0; }
    function zipStore(files) {
      const enc = new TextEncoder();
      const u16 = n => [n & 255, (n >> 8) & 255];
      const u32 = n => [n & 255, (n >> 8) & 255, (n >> 16) & 255, (n >> 24) & 255];
      let parts = [], central = [], offset = 0;
      for (const f of files) {
        const name = enc.encode(f.name), data = f.data, crc = crc32(data);
        const local = [].concat(u32(0x04034b50), u16(20), u16(0), u16(0), u16(0), u16(0), u32(crc), u32(data.length), u32(data.length), u16(name.length), u16(0));
        parts.push(new Uint8Array(local), name, data);
        central.push({ name, crc, size: data.length, offset });
        offset += 30 + name.length + data.length;
      }
      let cdParts = [], cdSize = 0;
      for (const c of central) {
        const h = [].concat(u32(0x02014b50), u16(20), u16(20), u16(0), u16(0), u16(0), u16(0), u32(c.crc), u32(c.size), u32(c.size), u16(c.name.length), u16(0), u16(0), u16(0), u16(0), u32(0), u32(c.offset));
        cdParts.push(new Uint8Array(h), c.name); cdSize += h.length + c.name.length;
      }
      const end = new Uint8Array([].concat(u32(0x06054b50), u16(0), u16(0), u16(central.length), u16(central.length), u32(cdSize), u32(offset), u16(0)));
      const all = parts.concat(cdParts, [end]);
      let total = all.reduce((s, a) => s + a.length, 0), out = new Uint8Array(total), pp = 0;
      for (const a of all) { out.set(a, pp); pp += a.length; }
      return out;
    }

    async function exportParallaxZip() {
      if (!img) return toast('Load an image first');
      toast('Rendering layers…');
      const prefix = 'conformation', files = [];
      const add = async (name, srcCanvas, w) => {
        let target = srcCanvas, tmp = null;
        if (w && w < width) {
          let sc = createGraphics(w, Math.round(height * w / width)); sc.pixelDensity(1); sc.clear();
          sc.drawingContext.drawImage(srcCanvas, 0, 0, sc.width, sc.height);
          target = sc.drawingContext.canvas; tmp = sc;
        }
        const blob = await new Promise(res => target.toBlob(res, 'image/webp', 0.9));
        if (tmp) tmp.remove();
        files.push({ name, data: new Uint8Array(await blob.arrayBuffer()) });
      };
      for (const [i, nm] of [[0, 'far'], [1, 'middle'], [2, 'near']]) {
        let g = pxRenderLayer(i);
        await add(prefix + '-' + nm + '.webp', g.drawingContext.canvas);
        await add(prefix + '-' + nm + '-960.webp', g.drawingContext.canvas, 960);
        g.remove();
      }
      // poster: full composite on transparent
      let gp = createGraphics(width, height); gp.pixelDensity(1); gp.clear(); gp.strokeCap(ROUND);
      const emit = (x1, y1, x2, y2, w, r, gg, b) => { gp.stroke(r, gg, b); gp.strokeWeight(w); gp.line(x1, y1, x2, y2); };
      let base = radians(angleSlider.value());
      generateField(base, emit); if (crosshatchToggle.checked()) generateField(base + HALF_PI, emit);
      await add(prefix + '-hero.webp', gp.drawingContext.canvas);
      await add(prefix + '-hero-960.webp', gp.drawingContext.canvas, 960);
      gp.remove();
      files.push({ name: 'snippet.html', data: new TextEncoder().encode(parallaxDoc({ far: prefix + '-far.webp', middle: prefix + '-middle.webp', near: prefix + '-near.webp' }, 'Conformation Parallax')) });
      downloadBlob(new Blob([zipStore(files)], { type: 'application/zip' }), prefix + '-parallax-layers.zip');
      toast('Exported ' + files.length + ' files (.zip)');
    }

  </script>
</body>
